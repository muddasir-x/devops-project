apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
    
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: my-backend:v1
        ports:
        - containerPort: 5000
